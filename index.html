<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="description" content="KROFF — qurilish mollari, asboblar, santexnika, bo'yoq katalogi. Narxlar va mavjudlik.">
<title>KROFF — Onlayn katalog</title>
<meta name="theme-color" content="#7d1f2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KROFF">
<style>
  :root{--blue:#2B2D6E;--bordo:#7d1f2e;--red:#D81F27;--line:#eceef2;--muted:#8b8ea4;--bg:#ffffff;--green:#2e7d32;--ink:#1c1c2e}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:20;background:#fff;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.06);border-bottom:3px solid var(--bordo)}
  .h-in{max-width:1180px;margin:0 auto;padding:12px 14px 10px}
  .h-row{display:flex;align-items:center;gap:12px}
  .h-logoimg{height:42px;display:block}
  .h-sub{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
  .h-contact{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.55;margin-top:9px}
  .h-contact a{color:var(--bordo);text-decoration:none;font-weight:700}
  .h-count{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;background:#f2f3f7;padding:5px 11px;border-radius:14px}
  .search{margin-top:10px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#f7f8fa;color:var(--ink);outline:none}.search input:focus{border-color:var(--bordo);background:#fff}
  .search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.45}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:10px 14px 2px;max-width:1180px;margin:0 auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
  .chip.on{background:var(--bordo);color:#fff;border-color:var(--bordo);font-weight:800}
  .chip .n{opacity:.6;font-weight:700;margin-left:3px}
  .wrap{max-width:1180px;margin:0 auto;padding:6px 14px 40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:13px;margin-top:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;display:flex;flex-direction:column;transition:transform .1s,box-shadow .15s}
  .card:hover{box-shadow:0 6px 18px rgba(43,45,110,.14);transform:translateY(-2px)}
  .ph{aspect-ratio:1/1;background:linear-gradient(135deg,#f2f3f7,#e9ebf1);display:flex;align-items:center;justify-content:center;position:relative}
  .ph img{width:100%;height:100%;object-fit:cover}
  .ph .noimg{display:flex;flex-direction:column;align-items:center;gap:5px;color:#aab4c2;font-size:11.5px;font-weight:600}
  .ph .noimg svg{width:34px;height:34px;opacity:.55}
  .badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
  .c-body{padding:11px 12px 13px;display:flex;flex-direction:column;flex:1}
  .c-nom{font-size:13.5px;font-weight:600;line-height:1.32;min-height:36px;margin-bottom:7px}
  .c-price{font-size:18px;font-weight:800;color:var(--blue);line-height:1}
  .c-price span{font-size:11.5px;font-weight:600;color:var(--muted)}
  .c-oldp{font-size:12px;font-weight:600;color:var(--muted);text-decoration:line-through;margin-left:3px}
  .chip.sale{border-color:var(--red);color:var(--red)}
  .c-stock{font-size:12px;font-weight:700;margin:6px 0 10px;display:flex;align-items:center;gap:5px}
  .in{color:var(--green)}.out{color:var(--red)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.g{background:var(--green)}.dot.r{background:var(--red)}
  .c-btns{display:flex;gap:7px;margin-top:auto}
  .c-btns a{flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1}
  .b-call{background:#e8f5ea;color:var(--green)}
  .b-call:active{background:#d5edd9}
  .b-tg{background:#e9e8f5;color:#2B2D6E}
  .b-tg:active{background:#dcdaf0}
  .b-ic{font-size:15px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
  .loader{text-align:center;padding:70px 20px;color:var(--muted)}
  .more{text-align:center;padding:16px;color:var(--muted);font-size:12.5px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px 14px 44px;border-top:1px solid var(--line);margin-top:20px;background:#fafbfc}
  footer a{color:var(--blue);text-decoration:none;font-weight:600}
  .f-c{font-size:14px;margin-bottom:8px}
  .f-addr{font-size:13px;margin-bottom:6px}
  .f-addr a{color:var(--blue);font-weight:600;text-decoration:none}
  .f-hours{font-size:12.5px;margin-bottom:10px}
  .fab{position:fixed;right:14px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:10px}
  .fab a{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;text-decoration:none;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .fab .tg{background:#229ED9}
  .fab .call{background:#2e7d32}
  .fab a:active{transform:scale(.93)}
  .badge-new{position:absolute;top:8px;right:8px;left:auto;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
  .c-optom{font-size:12px;font-weight:700;color:var(--bordo);margin:2px 0 0}
  .c-optom span{font-weight:600;color:var(--muted)}
  .toolbar{display:flex;gap:8px;align-items:center;margin-top:9px}
  .toolbar select{flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:11px;font-size:13.5px;font-family:inherit;background:#f7f8fa;color:var(--ink);font-weight:600;outline:none}
  .chip.newp{border-color:var(--green);color:var(--green)}
  #installBtn{display:none;margin-top:9px;width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer}
  .qr-ov{position:fixed;inset:0;background:rgba(20,20,40,.55);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .qr-ov.show{display:flex}
  .qr-box{background:#fff;border-radius:18px;padding:20px 20px 16px;max-width:320px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .qr-box h3{margin:0 0 4px;font-size:16px;color:var(--blue)}
  .qr-box .qr-sub{margin:0 0 14px;font-size:12.5px;color:var(--muted)}
  .qr-box img{width:220px;height:220px;border:1px solid var(--line);border-radius:10px}
  .qr-box .qr-url{font-size:11.5px;color:var(--muted);word-break:break-all;margin:12px 0 0}
  .qr-box .qr-x{margin-top:14px;padding:9px 22px;background:var(--bordo);color:#fff;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none}
  .pay-ov{position:fixed;inset:0;background:rgba(20,20,40,.55);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .pay-ov.show{display:flex}
  .pay-box{background:#fff;border-radius:18px;padding:20px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .pay-box h3{margin:0 0 8px;font-size:16px;color:var(--blue);text-align:center}
  .pay-row{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .pay-row:last-of-type{border-bottom:none}
  .pay-row .pi{font-size:21px;line-height:1.15}
  .pay-row .pcell{flex:1;min-width:0}
  .pay-row b{font-size:13.5px;color:var(--ink)}
  .pay-row .ps{font-size:12px;color:var(--muted);margin-top:2px}
  .pvwrap{margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pv{font-size:15px;font-weight:800;color:var(--bordo);letter-spacing:.4px}
  .pv-link{font-size:13.5px;font-weight:700;color:var(--blue);text-decoration:none;word-break:break-all}
  .cp{padding:4px 11px;font-size:11.5px;font-weight:700;background:#f2f3f7;color:var(--blue);border:none;border-radius:8px;cursor:pointer}
  .pay-x{margin-top:16px;width:100%;padding:10px;background:var(--bordo);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
</style>

function grp(n){return (Math.round(n)||0).toLocaleString('ru-RU').replace(/,/g,' ');}

function disc(it){var base=+it.narx||0;var pct=+it.chegirma||0;if(pct>0&&pct<100&&base>0)return{price:Math.round(base*(100-pct)/100),was:base,pct:Math.round(pct)};var e=+it.eski_narx||0;if(e>base&&base>0)return{price:base,was:e,pct:Math.round((e-base)/e*100)};return null;}

  var newN=ITEMS.filter(isNew).length;
  if(newN)h+='<div class="chip newp'+(CAT==='__new'?' on':'')+'" onclick="setCat(\'__new\')">🆕 Yangi<span class="n">'+newN+'</span></div>';
  order.forEach(function(c){h+='<div class="chip'+(CAT===c?' on':'')+'" onclick="setCat(\''+c.replace(/'/g,"\\'")+'\')">'+catIcon(c)+' '+esc(c)+'<span class="n">'+cnt[c]+'</span></div>';});
  document.getElementById('chips').innerHTML=h;
}
function setCat(c){CAT=c;buildChips();render();window.scrollTo({top:0,behavior:'smooth'});}
function setSort(v){SORT=v;render();}
function openQR(){var u=location.href.split('#')[0];document.getElementById('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=440x440&margin=1&data='+encodeURIComponent(u);document.getElementById('qrUrl').textContent=u;document.getElementById('qrOv').classList.add('show');}
function closeQR(){document.getElementById('qrOv').classList.remove('show');}
function payRow(ic,label,val,isLink,copy){
  var inner=isLink?('<a href="'+esc(val)+'" target="_blank" class="pv-link">'+esc(val)+'</a>')
    :('<span class="pv">'+esc(val)+'</span>'+(copy?'<button class="cp" onclick="cpNear(this)">Nusxa</button>':''));
  return '<div class="pay-row"><span class="pi">'+ic+'</span><div class="pcell"><b>'+esc(label)+'</b><div class="pvwrap">'+inner+'</div></div></div>';
}
function buildPay(){
  var b='';
  if(CONFIG.NAQD!==false)b+='<div class="pay-row"><span class="pi">💵</span><div class="pcell"><b>Naqd pul</b><div class="ps">Olib ketishda yoki yetkazib berishda</div></div></div>';
  if(CONFIG.PAYME)b+=(/^https?:/i.test(CONFIG.PAYME)?payRow('📲','Payme',CONFIG.PAYME,true,false):payRow('📲','Payme',CONFIG.PAYME,false,true));
  if(CONFIG.CARD)b+=payRow('💳','Karta (Payme / Click)',CONFIG.CARD,false,true);
  if(CONFIG.HISOB)b+=payRow('🏦','Hisob raqam',CONFIG.HISOB,false,true);
  var has=(CONFIG.NAQD!==false)||CONFIG.PAYME||CONFIG.CARD||CONFIG.HISOB;
  if(!has)b='<div class="ps" style="text-align:center">To\u2018lov ma\u2018lumotlari tez orada</div>';
  var el=document.getElementById('payBody');if(el)el.innerHTML=b;
  var pl=document.getElementById('payLink');if(pl)pl.style.display=has?'':'none';
}
function openPay(){document.getElementById('payOv').classList.add('show');}
function closePay(){document.getElementById('payOv').classList.remove('show');}
function cpNear(btn){var r=btn.closest('.pay-row'),t=r&&r.querySelector('.pv');if(!t)return;var s=t.textContent;try{navigator.clipboard.writeText(s);}catch(e){}var o=btn.textContent;btn.textContent='✓';setTimeout(function(){btn.textContent=o;},1200);}
function render(){
  var q=nrm(document.getElementById('q').value);
  var list=ITEMS;
  if(CAT==='__sale')list=list.filter(function(it){return disc(it);});
  else if(CAT==='__new')list=list.filter(isNew);
  else if(CAT!=='all')list=list.filter(function(it){return it._cat===CAT;});
  if(q)list=list.filter(function(it){return nrm(it.nom).indexOf(q)>=0||String(it.barcode||'').indexOf(q)>=0;});
  if(SORT!=='def'){list=list.slice();if(SORT==='pl')list.sort(function(a,b){return effPrice(a)-effPrice(b);});else if(SORT==='ph')list.sort(function(a,b){return effPrice(b)-effPrice(a);});else if(SORT==='az')list.sort(function(a,b){return String(a.nom||'').localeCompare(String(b.nom||''),'uz');});}
  document.getElementById('count').textContent=list.length+' ta';
  var app=document.getElementById('app');
  if(!list.length){app.innerHTML='<div class="empty">Hech narsa topilmadi 🔍</div>';return;}
  var lim=list.slice(0,240);
  app.innerHTML='<div class="grid">'+lim.map(card).join('')+'</div>'+(list.length>240?'<div class="more">'+list.length+' tadan 240 tasi ko\u2018rsatildi — qidiruv yoki kategoriyadan foydalaning</div>':'');
}
function load(){
  fetch(CONFIG.SB_URL+'/rest/v1/'+CONFIG.SB_TABLE+'?select=data&id=eq.1',{headers:{apikey:CONFIG.SB_KEY,Authorization:'Bearer '+CONFIG.SB_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){
      var data=(rows&&rows[0]&&rows[0].data)||{};
      if(typeof data==='string')data=JSON.parse(data);
      var products,contacts;
      if(Array.isArray(data)){products=data;contacts={};}else{products=data.products||[];contacts=data.contacts||{};}
      if(contacts.phone)CONFIG.PHONE=contacts.phone;
      if(contacts.tg)CONFIG.TELEGRAM=contacts.tg;
      if(contacts.name)CONFIG.SHOP_NAME=contacts.name;
      if(contacts.address)CONFIG.ADDRESS=contacts.address;
      if(contacts.map)CONFIG.MAP=contacts.map;
      if(contacts.hours)CONFIG.HOURS=contacts.hours;
      if(contacts.payme)CONFIG.PAYME=contacts.payme;
      if(contacts.card)CONFIG.CARD=contacts.card;
      if(contacts.hisob)CONFIG.HISOB=contacts.hisob;
      if('naqd' in contacts)CONFIG.NAQD=contacts.naqd;
      applyContacts();
      ITEMS=products||[];
      ITEMS.forEach(function(it){it._cat=catOf(it);});
      ITEMS.sort(function(a,b){return (b.qoldiq>0?1:0)-(a.qoldiq>0?1:0);});
      buildChips();
      render();
    })
    .catch(function(e){document.getElementById('app').innerHTML='<div class="empty">Katalog yuklanmadi.<br><small>'+esc(e.message)+'</small></div>';});
}
/* PWA: manifest + install */
(function(){try{
  var mani={name:'KROFF — Onlayn katalog',short_name:'KROFF',start_url:'.',scope:'.',display:'standalone',background_color:'#ffffff',theme_color:'#7d1f2e',icons:[{src:ICON,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  var b=new Blob([JSON.stringify(mani)],{type:'application/json'});
  var l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);document.head.appendChild(l);
  var ai=document.createElement('link');ai.rel='apple-touch-icon';ai.href=ICON;document.head.appendChild(ai);
}catch(e){}})();
var _ip=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();_ip=e;var b=document.getElementById('installBtn');if(b)b.style.display='block';});
window.addEventListener('appinstalled',function(){var b=document.getElementById('installBtn');if(b)b.style.display='none';});
function doInstall(){if(!_ip)return;_ip.prompt();_ip.userChoice.then(function(){_ip=null;var b=document.getElementById('installBtn');if(b)b.style.display='none';});}
load();
</script>
</body>
